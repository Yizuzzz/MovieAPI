<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Popcorn Time 🍿</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔥 NAVBAR -->
<div class="navbar">
    <h1>🍿 Popcorn Time</h1>

    <div class="nav-buttons">
        <button class="btn-primary" onclick="searchMovies()">🔍 Buscar</button>
        <button id="favorites-btn" class="btn-secondary hidden" onclick="loadFavorites()">⭐ Favoritos</button>
        <button id="watchlist-btn" class="btn-secondary hidden" onclick="loadWatchlist()">📌 Watchlist</button>

        <!-- Auth -->
        <button id="login-btn" class="btn-auth" onclick="showLogin()">Login</button>
        <button id="register-btn" class="btn-auth" onclick="showRegister()">Register</button>
        <button id="logout-btn" class="btn-logout hidden" onclick="logout()">Logout</button>
    </div>
</div>

<!-- 🔍 SEARCH -->
<div class="search-container">
    <input type="text" id="movie-name" placeholder="Buscar película...">
</div>

<!-- 🔐 LOGIN MODAL -->
<div id="login-modal" class="modal hidden">
    <div class="modal-content auth-modal">
        <h2>Iniciar sesión</h2>

        <input type="text" id="login-email" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">

        <button class="btn-primary" onclick="login()">Ingresar</button>

        <p class="auth-switch">
            ¿No tienes cuenta?
            <span onclick="switchToRegister()">Regístrate</span>
        </p>

        <button class="modal-close" onclick="closeAuthModals()">✖</button>
    </div>
</div>


<!-- 🆕 REGISTER MODAL -->
<div id="register-modal" class="modal hidden">
    <div class="modal-content auth-modal">
        <h2>Crear cuenta</h2>

        <input type="text" id="register-username" placeholder="Username">
        <input type="text" id="register-email" placeholder="Email">
        <input type="password" id="register-password" placeholder="Password">

        <button class="btn-primary" onclick="register()">Crear cuenta</button>

        <p class="auth-switch">
            ¿Ya tienes cuenta?
            <span onclick="switchToLogin()">Inicia sesión</span>
        </p>

        <button class="modal-close" onclick="closeAuthModals()">✖</button>
    </div>
</div>


<!-- 🎬 CONTENIDO SPA -->
<h2 id="section-title"></h2>

<div id="view-search" class="view grid"></div>
<div id="view-favorites" class="view grid hidden"></div>
<div id="view-watchlist" class="view grid hidden"></div>

<!-- ⚠️ MENSAJES -->
<div id="message" class="message"></div>

<div id="edit-modal" class="modal hidden">
    <div class="modal-content">
        <h2>Editar película</h2>

        <input type="number" id="edit-rating" placeholder="Rating (0-5)" min="0" max="5">
        <textarea id="edit-review" placeholder="Escribe tu reseña..."></textarea>

        <div class="modal-actions">
            <button class="btn-primary" onclick="submitEdit()">Guardar</button>
            <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
