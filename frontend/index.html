<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Popcorn Time 🍿</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- 🔥 NAVBAR -->
    <div class="navbar">
        <h1>🍿 Popcorn Time</h1>

        <div class="nav-buttons">
            <button class="btn-primary" onclick="searchMovies()">🔍 Buscar</button>
            <button class="btn-secondary" onclick="getFavorites()">⭐ Favoritos</button>
        </div>
    </div>

    <!-- 🔍 SEARCH -->
    <div class="search-container">
        <input type="text" id="movie-name" placeholder="Buscar película...">
    </div>

    <!-- 🎬 CONTENIDO -->
    <div id="results" class="grid"></div>
    <div id="favorites" class="grid"></div>

    <script src="script.js"></script>

</body>
</html>
